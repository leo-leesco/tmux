set-window-option -g mode-keys vi                # setup copy-mode to work like vim
set -g mouse on
set -g word-separators " "                       # include full word when selecting
set -g base-index 1

set -g status-left-length 200
set -g status-left "#{S:#{?session_attached,#[fg=black#,bg=brightcyan#,bold][#{session_name} >#{W: #{window_index}:#{window_name}#{window_flags}}]#[default],#{session_name}} }"
set -g window-status-format ""
set -g window-status-current-format ""
set -g status-style "bg=brightblack,fg=brightwhite"

set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=black#,bg=brightcyan#,bold],#[fg=brightwhite#,bg=brightblack]} #P: #{pane_current_command} "
