# use alt+tab/alt+maj+tab to move between windows
bind -n M-Tab next-window
bind -n M-BTab previous-window

# ctrl+alt+left/right or h/l to move between sessions
bind -n C-M-Left switch-client -p
bind -n C-M-Right switch-client -n
bind -n C-M-h switch-client -p
bind -n C-M-l switch-client -n

# ctrl+alt+j/k to move between windows
bind -n C-M-j previous-window
bind -n C-M-k next-window

bind ù split-window -v -c "#{pane_current_path}" # split pane <prefix>" now bound to <prefix>ù
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind C command-prompt -p "new session:" "new-session -s '%%'"
bind x confirm-before -p "kill-window #W? (y/n)" kill-window
bind X confirm-before -p "kill-session #S? (y/n)" kill-session
bind m command-prompt -p "move pane to:" "join-pane -t '%%'"
bind M command-prompt -p "move window to session:" "move-window -t '%%:'"
bind ? command-prompt -I "#S" -p "rename session:" "rename-session '%%'"

bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"
bind l display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# select session by 1-based alphabetical index (mirrors status-left numbering)
bind 1 run-shell '~/.config/tmux/switch-session-by-index.sh 1'
bind 2 run-shell '~/.config/tmux/switch-session-by-index.sh 2'
bind 3 run-shell '~/.config/tmux/switch-session-by-index.sh 3'
bind 4 run-shell '~/.config/tmux/switch-session-by-index.sh 4'
bind 5 run-shell '~/.config/tmux/switch-session-by-index.sh 5'
bind 6 run-shell '~/.config/tmux/switch-session-by-index.sh 6'
bind 7 run-shell '~/.config/tmux/switch-session-by-index.sh 7'
bind 8 run-shell '~/.config/tmux/switch-session-by-index.sh 8'
bind 9 run-shell '~/.config/tmux/switch-session-by-index.sh 9'
