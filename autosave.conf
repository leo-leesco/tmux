# resurrect: capture as much state as possible
set -g @resurrect-capture-pane-contents 'on'     # restore visible pane contents
set -g @resurrect-strategy-nvim 'session'        # restore nvim sessions if Session.vim exists
set -g @resurrect-strategy-vim 'session'

# continuum: aggressive auto-save + auto-restore on first tmux start
set -g @continuum-save-interval '5'              # save every 5 minutes (default 15)
set -g @continuum-restore 'on'                   # auto-restore last save on tmux server start
set -g @continuum-boot 'on'                      # start tmux automatically at OS login
