# azerty copy-mode bindings (mirrors ~/.config/nvim/plugin/azerty.vim)
bind-key -T copy-mode-vi § send-keys -X previous-paragraph
bind-key -T copy-mode-vi à send-keys -X next-paragraph
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind-key -T copy-mode-vi K send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "tr -d '[:space:]' | ~/.tmux/open.sh"  # open URL or file

# azerty window selection (physical keys 1-0 on AZERTY)
bind-key & select-window -t 1
bind-key é select-window -t 2
bind-key '"' select-window -t 3
bind-key "'" select-window -t 4
bind-key ( select-window -t 5
bind-key § select-window -t 6
bind-key è select-window -t 7
bind-key ! select-window -t 8
bind-key ç select-window -t 9
bind-key à select-window -t 0
